<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Results - Finance Academy</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>document.documentElement.setAttribute("data-lang",localStorage.getItem("finance_academy_lang")||"de")</script>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body class="min-h-screen bg-gradient-to-br from-slate-900 via-purple-900 to-slate-900 text-white overflow-x-hidden">
    <div class="fixed inset-0 overflow-hidden pointer-events-none z-0">
        <div class="absolute -top-40 -left-40 w-80 h-80 bg-purple-500/30 rounded-full blur-3xl animate-float"></div>
        <div class="absolute top-1/3 -right-20 w-96 h-96 bg-blue-500/20 rounded-full blur-3xl animate-float-slow"></div>
        <div class="absolute -bottom-40 left-1/3 w-80 h-80 bg-pink-500/20 rounded-full blur-3xl animate-float-slower"></div>
    </div>

    <nav class="fixed top-0 w-full z-50 glass-nav">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex items-center justify-between h-16">
                <a href="../index.html" class="flex items-center space-x-2">
                    <span class="text-2xl">💰</span>
                    <span class="text-xl font-bold bg-gradient-to-r from-cyan-400 to-purple-400 bg-clip-text text-transparent">Finance Academy</span>
                </a>
                <div class="hidden md:flex items-center space-x-4">
                    <a href="../index.html" class="nav-link">Home</a>
                    <a href="../chapters/chapter1.html" class="nav-link"><span class="lang-de">Kapitel</span><span class="lang-en">Chapters</span></a>
                    <a href="scoreboard.html" class="nav-link active"><span class="lang-de">Ergebnisse</span><span class="lang-en">Results</span></a>
                    <button id="lang-toggle" onclick="Lang.toggle()" class="nav-link font-semibold cursor-pointer">🇬🇧 EN</button>
                </div>
                <div class="flex items-center gap-2 md:hidden">
                    <button onclick="Lang.toggle()" class="p-2 rounded-lg glass-card text-sm font-semibold" id="lang-toggle-mobile">🇬🇧 EN</button>
                </div>
            </div>
        </div>
    </nav>

    <main class="pt-24 pb-16 px-4 relative z-10">
        <div class="max-w-5xl mx-auto">
            <div class="text-center mb-12 animate-fade-in">
                <span class="inline-block text-6xl mb-4">🏆</span>
                <h1 class="text-4xl md:text-5xl font-bold mb-4">
                    <span class="bg-gradient-to-r from-cyan-400 to-purple-400 bg-clip-text text-transparent">
                        <span class="lang-de">Ergebnisse</span><span class="lang-en">Results</span>
                    </span>
                </h1>
                <p class="text-gray-400 text-lg"><span class="lang-de">Übersicht aller Testergebnisse</span><span class="lang-en">Overview of all test results</span></p>
            </div>

            <div class="grid grid-cols-3 gap-4 mb-8" id="summary-cards"></div>

            <div class="glass-card rounded-3xl p-6 mb-8 animate-on-scroll">
                <h2 class="text-2xl font-bold mb-6"><span class="lang-de">📊 Detaillierte Ergebnisse</span><span class="lang-en">📊 Detailed Results</span></h2>
                <div class="overflow-x-auto">
                    <div class="score-row header">
                        <div><span class="lang-de">Kapitel</span><span class="lang-en">Chapter</span></div>
                        <div class="text-center">Luisa</div>
                        <div class="text-center">Marlene</div>
                        <div class="text-center">Carla</div>
                    </div>
                    <div id="score-rows"></div>
                </div>
            </div>

            <div class="glass-card rounded-3xl p-6 mb-8 animate-on-scroll">
                <h2 class="text-2xl font-bold mb-6"><span class="lang-de">📈 Fortschritt</span><span class="lang-en">📈 Progress</span></h2>
                <div id="progress-bars" class="space-y-4"></div>
            </div>

            <div class="flex flex-wrap gap-4 justify-center animate-on-scroll">
                <a href="../chapters/chapter1.html" class="glass-button-primary px-6 py-3 rounded-xl inline-flex items-center space-x-2">
                    <span>📚</span><span><span class="lang-de">Zum ersten Kapitel</span><span class="lang-en">Go to first chapter</span></span>
                </a>
                <button onclick="resetAll()" class="glass-button px-6 py-3 rounded-xl inline-flex items-center space-x-2 text-red-400">
                    <span>🗑️</span><span><span class="lang-de">Alle Ergebnisse löschen</span><span class="lang-en">Delete all results</span></span>
                </button>
            </div>
        </div>
    </main>

    <script src="../js/main.js"></script>
    <script>
        const chapters = [
            { num: 1, title_de: 'Was ist Geld?', title_en: 'What is Money?', icon: '💶' },
            { num: 2, title_de: 'Einnahmen & Ausgaben', title_en: 'Income & Expenses', icon: '🏦' },
            { num: 3, title_de: 'Sparen & Ziele setzen', title_en: 'Saving & Setting Goals', icon: '🐷' },
            { num: 4, title_de: 'Banken & Konten', title_en: 'Banks & Accounts', icon: '🏧' },
            { num: 5, title_de: 'Zinsen & Zinseszins', title_en: 'Interest & Compound Interest', icon: '📊' },
            { num: 6, title_de: 'Investieren Grundlagen', title_en: 'Investing Basics', icon: '📈' },
            { num: 7, title_de: 'Risiko & Diversifikation', title_en: 'Risk & Diversification', icon: '⚖️' },
            { num: 8, title_de: 'Schulden & Kredite', title_en: 'Debt & Loans', icon: '💳' },
            { num: 9, title_de: 'Steuern & Staat', title_en: 'Taxes & Government', icon: '🧾' },
            { num: 10, title_de: 'Dein Finanzplan', title_en: 'Your Financial Plan', icon: '🚀' },
        ];

        const kids = ['Luisa', 'Marlene', 'Carla'];
        const kidColors = ['cyan', 'purple', 'pink'];
        const t = (de, en) => Lang.get() === 'de' ? de : en;

        function render() {
            const scores = TestSystem.getScores();
            Lang.apply();

            const summaryEl = document.getElementById('summary-cards');
            summaryEl.innerHTML = kids.map((kid, ki) => {
                let totalScore = 0, totalQuestions = 0, completedChapters = 0;
                chapters.forEach(ch => {
                    const s = scores[`ch${ch.num}_kid${ki}`];
                    if (s) { totalScore += s.score; totalQuestions += s.total; completedChapters++; }
                });
                const avgPercent = totalQuestions > 0 ? Math.round((totalScore / totalQuestions) * 100) : 0;
                const emoji = avgPercent >= 80 ? '🏆' : avgPercent >= 60 ? '⭐' : avgPercent > 0 ? '📚' : '⏳';
                return `
                    <div class="glass-card rounded-2xl p-6 text-center">
                        <div class="text-3xl mb-2">${emoji}</div>
                        <h3 class="font-bold text-${kidColors[ki]}-400 mb-1">${kid}</h3>
                        <div class="text-3xl font-bold mb-1">${totalQuestions > 0 ? avgPercent + '%' : '-'}</div>
                        <p class="text-gray-500 text-xs">${completedChapters}/10 ${t('Kapitel', 'chapters')}</p>
                        <div class="progress-bar mt-3"><div class="progress-fill" style="width: ${completedChapters * 10}%"></div></div>
                    </div>
                `;
            }).join('');

            const rowsEl = document.getElementById('score-rows');
            rowsEl.innerHTML = chapters.map(ch => {
                const title = Lang.get() === 'de' ? ch.title_de : ch.title_en;
                const cells = kids.map((kid, ki) => {
                    const s = scores[`ch${ch.num}_kid${ki}`];
                    if (!s) return '<div class="score-cell pending">-</div>';
                    const cls = s.percentage >= 80 ? 'high' : s.percentage >= 60 ? 'medium' : 'low';
                    return `<div class="score-cell ${cls}">${s.percentage}%</div>`;
                }).join('');
                return `<div class="score-row"><div class="flex items-center gap-2"><span>${ch.icon}</span><a href="../chapters/chapter${ch.num}.html" class="hover:text-cyan-400 transition-colors text-sm">${title}</a></div>${cells}</div>`;
            }).join('');

            const progressEl = document.getElementById('progress-bars');
            progressEl.innerHTML = kids.map((kid, ki) => {
                let completed = 0;
                chapters.forEach(ch => { if (scores[`ch${ch.num}_kid${ki}`]) completed++; });
                return `<div><div class="flex justify-between text-sm mb-1"><span class="text-${kidColors[ki]}-400 font-semibold">${kid}</span><span class="text-gray-400">${completed}/10 ${t('Kapitel', 'chapters')}</span></div><div class="progress-bar"><div class="progress-fill" style="width: ${completed * 10}%"></div></div></div>`;
            }).join('');
        }

        function resetAll() {
            if (confirm(t('Wirklich ALLE Ergebnisse löschen? Das kann nicht rückgängig gemacht werden!', 'Really delete ALL results? This cannot be undone!'))) {
                TestSystem.clearAll();
                render();
            }
        }

        // Override Lang.apply to also re-render scoreboard
        const origApply = Lang.apply.bind(Lang);
        Lang.apply = function() { origApply(); render(); };
        render();
    </script>
</body>
</html>
