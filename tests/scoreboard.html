<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ergebnisse - Finance Academy</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body class="min-h-screen bg-gradient-to-br from-slate-900 via-purple-900 to-slate-900 text-white overflow-x-hidden">
    <div class="fixed inset-0 overflow-hidden pointer-events-none z-0">
        <div class="absolute -top-40 -left-40 w-80 h-80 bg-purple-500/30 rounded-full blur-3xl animate-float"></div>
        <div class="absolute top-1/3 -right-20 w-96 h-96 bg-blue-500/20 rounded-full blur-3xl animate-float-slow"></div>
        <div class="absolute -bottom-40 left-1/3 w-80 h-80 bg-pink-500/20 rounded-full blur-3xl animate-float-slower"></div>
    </div>

    <nav class="fixed top-0 w-full z-50 glass-nav">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex items-center justify-between h-16">
                <a href="../index.html" class="flex items-center space-x-2">
                    <span class="text-2xl">💰</span>
                    <span class="text-xl font-bold bg-gradient-to-r from-cyan-400 to-purple-400 bg-clip-text text-transparent">Finance Academy</span>
                </a>
                <div class="hidden md:flex items-center space-x-4">
                    <a href="../index.html" class="nav-link">Home</a>
                    <a href="../chapters/chapter1.html" class="nav-link">Kapitel</a>
                    <a href="scoreboard.html" class="nav-link active">Ergebnisse</a>
                </div>
            </div>
        </div>
    </nav>

    <main class="pt-24 pb-16 px-4 relative z-10">
        <div class="max-w-5xl mx-auto">
            <div class="text-center mb-12 animate-fade-in">
                <span class="inline-block text-6xl mb-4">🏆</span>
                <h1 class="text-4xl md:text-5xl font-bold mb-4">
                    <span class="bg-gradient-to-r from-cyan-400 to-purple-400 bg-clip-text text-transparent">Ergebnisse</span>
                </h1>
                <p class="text-gray-400 text-lg">Übersicht aller Testergebnisse</p>
            </div>

            <!-- Summary Cards -->
            <div class="grid grid-cols-3 gap-4 mb-8" id="summary-cards">
                <!-- Generated by JS -->
            </div>

            <!-- Detailed Scoreboard -->
            <div class="glass-card rounded-3xl p-6 mb-8 animate-on-scroll">
                <h2 class="text-2xl font-bold mb-6">📊 Detaillierte Ergebnisse</h2>
                <div class="overflow-x-auto">
                    <div class="score-row header">
                        <div>Kapitel</div>
                        <div class="text-center">Kind 1</div>
                        <div class="text-center">Kind 2</div>
                        <div class="text-center">Kind 3</div>
                    </div>
                    <div id="score-rows">
                        <!-- Generated by JS -->
                    </div>
                </div>
            </div>

            <!-- Progress Chart -->
            <div class="glass-card rounded-3xl p-6 mb-8 animate-on-scroll">
                <h2 class="text-2xl font-bold mb-6">📈 Fortschritt</h2>
                <div id="progress-bars" class="space-y-4">
                    <!-- Generated by JS -->
                </div>
            </div>

            <!-- Actions -->
            <div class="flex flex-wrap gap-4 justify-center animate-on-scroll">
                <a href="../chapters/chapter1.html" class="glass-button-primary px-6 py-3 rounded-xl inline-flex items-center space-x-2">
                    <span>📚</span><span>Zum ersten Kapitel</span>
                </a>
                <button onclick="resetAll()" class="glass-button px-6 py-3 rounded-xl inline-flex items-center space-x-2 text-red-400">
                    <span>🗑️</span><span>Alle Ergebnisse löschen</span>
                </button>
            </div>
        </div>
    </main>

    <script src="../js/main.js"></script>
    <script>
        const chapters = [
            { num: 1, title: 'Was ist Geld?', icon: '💶' },
            { num: 2, title: 'Einnahmen & Ausgaben', icon: '🏦' },
            { num: 3, title: 'Sparen & Ziele setzen', icon: '🐷' },
            { num: 4, title: 'Banken & Konten', icon: '🏧' },
            { num: 5, title: 'Zinsen & Zinseszins', icon: '📊' },
            { num: 6, title: 'Investieren Grundlagen', icon: '📈' },
            { num: 7, title: 'Risiko & Diversifikation', icon: '⚖️' },
            { num: 8, title: 'Schulden & Kredite', icon: '💳' },
            { num: 9, title: 'Steuern & Staat', icon: '🧾' },
            { num: 10, title: 'Dein Finanzplan', icon: '🚀' },
        ];

        const kids = ['Kind 1', 'Kind 2', 'Kind 3'];
        const kidColors = ['cyan', 'purple', 'pink'];

        function render() {
            const scores = TestSystem.getScores();

            // Summary cards
            const summaryEl = document.getElementById('summary-cards');
            summaryEl.innerHTML = kids.map((kid, ki) => {
                let totalScore = 0, totalQuestions = 0, completedChapters = 0;
                chapters.forEach(ch => {
                    const s = scores[`ch${ch.num}_kid${ki}`];
                    if (s) {
                        totalScore += s.score;
                        totalQuestions += s.total;
                        completedChapters++;
                    }
                });
                const avgPercent = totalQuestions > 0 ? Math.round((totalScore / totalQuestions) * 100) : 0;
                const emoji = avgPercent >= 80 ? '🏆' : avgPercent >= 60 ? '⭐' : avgPercent > 0 ? '📚' : '⏳';

                return `
                    <div class="glass-card rounded-2xl p-6 text-center">
                        <div class="text-3xl mb-2">${emoji}</div>
                        <h3 class="font-bold text-${kidColors[ki]}-400 mb-1">${kid}</h3>
                        <div class="text-3xl font-bold mb-1">${totalQuestions > 0 ? avgPercent + '%' : '-'}</div>
                        <p class="text-gray-500 text-xs">${completedChapters}/10 Kapitel</p>
                        <div class="progress-bar mt-3">
                            <div class="progress-fill" style="width: ${completedChapters * 10}%"></div>
                        </div>
                    </div>
                `;
            }).join('');

            // Score rows
            const rowsEl = document.getElementById('score-rows');
            rowsEl.innerHTML = chapters.map(ch => {
                const cells = kids.map((kid, ki) => {
                    const s = scores[`ch${ch.num}_kid${ki}`];
                    if (!s) return '<div class="score-cell pending">-</div>';
                    const cls = s.percentage >= 80 ? 'high' : s.percentage >= 60 ? 'medium' : 'low';
                    return `<div class="score-cell ${cls}">${s.percentage}%</div>`;
                }).join('');
                return `
                    <div class="score-row">
                        <div class="flex items-center gap-2">
                            <span>${ch.icon}</span>
                            <a href="../chapters/chapter${ch.num}.html" class="hover:text-cyan-400 transition-colors text-sm">${ch.title}</a>
                        </div>
                        ${cells}
                    </div>
                `;
            }).join('');

            // Progress bars
            const progressEl = document.getElementById('progress-bars');
            progressEl.innerHTML = kids.map((kid, ki) => {
                let completed = 0;
                chapters.forEach(ch => {
                    if (scores[`ch${ch.num}_kid${ki}`]) completed++;
                });
                return `
                    <div>
                        <div class="flex justify-between text-sm mb-1">
                            <span class="text-${kidColors[ki]}-400 font-semibold">${kid}</span>
                            <span class="text-gray-400">${completed}/10 Kapitel</span>
                        </div>
                        <div class="progress-bar">
                            <div class="progress-fill" style="width: ${completed * 10}%"></div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function resetAll() {
            if (confirm('Wirklich ALLE Ergebnisse löschen? Das kann nicht rückgängig gemacht werden!')) {
                TestSystem.clearAll();
                render();
            }
        }

        render();
    </script>
</body>
</html>
